<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelixWin — Gire e Ganhe</title>
  <meta name="description" content="Jogue Bk Jump e transforme suas habilidades em dinheiro real.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading global -->
  <div id="global-loading" class="global-loading hidden">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <div id="app">
    <section id="page-landing" class="page"></section>
    <section id="page-login" class="page"></section>
    <section id="page-cadastro" class="page"></section>
    <section id="page-painel" class="page"></section>
    <section id="page-jogo" class="page"></section>
  </div>

  <!-- Utilitários antes de tudo -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>

  <!-- Páginas -->
  <script src="js/landing.js"></script>
  <script src="js/login.js"></script>
  <script src="js/cadastro.js"></script>
  <script src="js/painel.js"></script>
  <script src="js/jogo.js"></script>

  <!-- Router — carregado por último -->
  <script src="js/app.js"></script>

    <script>
    async function pingBackend() {
      try {
        await fetch("https://beckhend-bk.onrender.com/api/health", {
          cache: "no-store"
        });
      } catch (err) {}
    }

    window.addEventListener("load", () => {
      pingBackend();

      // mantém acordado enquanto usuário está no site
      setInterval(pingBackend, 60 * 1000); // a cada 1 minuto
    });
  </script>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HLSVNYE462"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HLSVNYE462');
</script>

  <!-- Link de Termos de Uso — visível apenas na landing (controlado pelo router) -->
  <div id="landing-termos-link" style="display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:200;text-align:center;pointer-events:auto">
    <button id="btn-termos" style="background:none;border:none;color:rgba(255,255,255,0.30);font-size:11px;cursor:pointer;text-decoration:underline;letter-spacing:0.3px;padding:4px 8px">
      Termos de Uso
    </button>
  </div>


</body></html>
